name: PR Validation

on:
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.33.4'

jobs:
  validate:
    name: Validate Repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Validate no private financial sample files are committed
        shell: bash
        run: |
          set -euo pipefail
          forbidden=$(git ls-files | grep -Ei '(^|/)(raw-statements|statement-storage|samples/private|fixtures/private)(/|$)|\.(pdf|xlsx|csv)\.private$|(^|/)(bank-statement|account-statement)[^/]*\.(pdf|xlsx|csv|ofx|qif|qfx)$' || true)
          if [[ -n "$forbidden" ]]; then
            echo "Forbidden sensitive/private financial files detected:"
            echo "$forbidden"
            exit 1
          fi

      - name: Validate shell scripts
        shell: bash
        run: |
          git ls-files "*.sh" -z | xargs -0 -r bash -n

      - name: Validate JSON files
        shell: bash
        run: |
          git ls-files "*.json" -z | xargs -0 -r -I{} jq empty "{}"

      - name: Validate YAML parse
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .github/workflows
          config_data: |
            extends: default
            rules:
              line-length: disable
              truthy: disable
              comments-indentation: disable
              document-start: disable
              brackets: disable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Workspace lint
        run: pnpm lint

      - name: Workspace typecheck
        run: pnpm typecheck
