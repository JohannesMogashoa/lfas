name: Docker Validate

on:
  pull_request:
    branches: [ master ]
    paths:
      - 'docker-compose.yml'
      - 'docker-compose.*.yml'
      - 'docker-compose.*.yaml'
      - '**/Dockerfile'
      - '**/Dockerfile.*'
      - '**/*.dockerfile'
      - '**/.dockerignore'
      - '.github/workflows/docker-validate.yml'
  push:
    branches: [ master ]
    paths:
      - 'docker-compose.yml'
      - 'docker-compose.*.yml'
      - 'docker-compose.*.yaml'
      - '**/Dockerfile'
      - '**/Dockerfile.*'
      - '**/*.dockerfile'
      - '**/.dockerignore'
      - '.github/workflows/docker-validate.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compose-validate:
    name: Validate Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate compose config
        run: docker compose config

      - name: Start dependencies
        run: docker compose up -d postgres

      - name: Check running containers
        run: docker compose ps

      - name: Stop dependencies
        if: always()
        run: docker compose down -v
