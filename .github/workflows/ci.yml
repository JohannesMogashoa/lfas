name: CI

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lfas
          POSTGRES_PASSWORD: lfas_dev_password_change_me
          POSTGRES_DB: lfas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lfas -d lfas_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json

      - name: Restore
        run: dotnet restore LFAS.slnx

      - name: Build
        run: dotnet build LFAS.slnx --configuration Release --no-restore -warnaserror

      - name: Test
        run: >
          dotnet test LFAS.slnx
          --configuration Release
          --no-build
          --logger "trx;LogFilePrefix=test-results"
          --collect:"XPlat Code Coverage"
          --results-directory TestResults
        env:
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=lfas_test;Username=lfas;Password=lfas_dev_password_change_me

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults
          if-no-files-found: ignore

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: ignore
