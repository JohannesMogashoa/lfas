name: CI

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '11.7.0'

jobs:
  repository-hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate no private financial sample files are committed
        shell: bash
        run: |
          set -euo pipefail
          forbidden=$(git ls-files | grep -Ei '(^|/)(raw-statements|statement-storage|samples/private|fixtures/private)(/|$)|\.(pdf|xlsx|csv)\.private$|(^|/)(bank-statement|account-statement)[^/]*\.(pdf|xlsx|csv|ofx|qif|qfx)$' || true)
          if [[ -n "$forbidden" ]]; then
            echo "Forbidden sensitive/private financial files detected:"
            echo "$forbidden"
            exit 1
          fi

      - name: Validate shell scripts
        shell: bash
        run: git ls-files "*.sh" -z | xargs -0 -r bash -n

      - name: Validate JSON files
        shell: bash
        run: git ls-files "*.json" -z | xargs -0 -r -I{} jq empty "{}"

      - name: Validate workflow YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .github/workflows
          config_data: |
            extends: default
            rules:
              line-length: disable
              truthy: disable
              comments-indentation: disable
              document-start: disable
              brackets: disable

  build-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: repository-hygiene

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format

      - name: Markdown lint
        run: pnpm dlx markdownlint-cli2 "**/*.md" "!**/node_modules/**" "!**/.next/**" "!**/.turbo/**" "!**/dist/**" "!**/coverage/**" "!apps/web/.agents/**" "!apps/web/.claude/**" "!apps/web/convex/_generated/**"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
