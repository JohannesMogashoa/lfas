services:
  postgres:
    image: postgres:16-alpine
    container_name: lfas-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lfas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lfas_dev_password_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-lfas}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lfas} -d ${POSTGRES_DB:-lfas}"]
      interval: 10s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lfas-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin_change_me}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin-data:/var/lib/pgadmin

volumes:
  postgres-data:
  pgadmin-data:
